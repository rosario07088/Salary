<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tell My Doggy - Salary V8</title>
    <style>
        :root {
            --morandi-green: #A3B18A;
            --morandi-light: #B8C1B0;
            --morandi-bg: #F4F5F2;
            --text-color: #5E6B5E;
            --morandi-red: #D4A5A5;
        }

        body {
            font-family: "PingFang TC", sans-serif;
            background-color: var(--morandi-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 20px;
            min-height: 550px;
        }

        .tabs { display: flex; background: var(--morandi-light); }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; background: none; color: white; cursor: pointer; font-size: 13px; text-align: center; }
        .tab-btn.active { background: var(--morandi-green); font-weight: bold; }

        .page { padding: 20px; display: none; }
        .page.active { display: block; }

        h2 { text-align: center; color: var(--morandi-green); margin-top: 0; font-size: 1.2rem; }

        /* 月曆樣式 */
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nav-btn { background: none; border: 1px solid var(--morandi-light); color: var(--morandi-green); border-radius: 50%; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day { padding: 10px 0; font-size: 14px; border-radius: 8px; position: relative; cursor: pointer; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .day.has-work::after { content: '🍡'; font-size: 10px; position: absolute; bottom: 2px; right: 2px; }
        .day:hover { background-color: var(--morandi-bg); }
        .weekday { font-weight: bold; color: var(--morandi-light); padding-bottom: 10px; }

        #datePopover {
            display: none; position: absolute; background: white; border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 10px; z-index: 100;
            border: 2px solid var(--morandi-light); width: 150px;
        }
        #datePopover button {
            display: block; width: 100%; background: var(--morandi-bg); border: none;
            color: var(--morandi-green); padding: 8px 10px; text-align: center;
            border-radius: 6px; margin-bottom: 5px; cursor: pointer; font-size: 14px;
        }

        /* 表單對齊修正 */
        .input-group { margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: var(--morandi-green); text-align: center; }
        
        input, select {
            width: 100%; 
            padding: 12px; 
            border: 2px solid var(--morandi-light); 
            border-radius: 15px;
            color: var(--text-color); 
            font-size: 16px; 
            background: white; 
            outline: none; 
            box-sizing: border-box; /* 確保 padding 不會撐破寬度 */
            text-align: center; /* 內容置中 */
            text-align-last: center; /* 下拉選單文字置中 */
        }

        .flex-row { display: flex; gap: 10px; align-items: center; }
        
        /* 按鈕樣式 */
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .main-btn { width: 100%; padding: 15px; background: var(--morandi-green); color: white; border: none; border-radius: 15px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .delete-btn { width: 100%; padding: 10px; background: white; color: var(--morandi-red); border: 1px solid var(--morandi-red); border-radius: 15px; font-size: 14px; cursor: pointer; margin-top: 5px; }

        /* 統計頁篩選框 */
        .filter-box {
            background: var(--morandi-bg);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .filter-box label { text-align: left; font-size: 12px; margin-bottom: 2px; }
        .filter-box input { padding: 8px; font-size: 14px; margin-bottom: 10px; border-radius: 10px; }

        /* 統計卡片 */
        .stat-card { padding: 15px; border-radius: 15px; margin-bottom: 12px; color: white; background-color: var(--morandi-green); }
        .stat-item { font-size: 13px; margin-top: 5px; padding-left: 10px; border-left: 2px solid rgba(255,255,255,0.3); cursor: pointer; }
        .total-summary { text-align: center; border-top: 1px dashed var(--morandi-light); padding-top: 15px; margin-top: 15px; }

        .list-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div class="tabs">
            <button class="tab-btn active" onclick="showPage('page1')">打卡紀錄</button>
            <button class="tab-btn" onclick="showPage('page2')">紀錄</button>
            <button class="tab-btn" onclick="showPage('page3')">統計</button>
            <button class="tab-btn" onclick="showPage('page4')">設定</button>
        </div>

        <div id="page1" class="page active">
            <h2>打卡紀錄</h2>
            <div class="calendar-nav">
                <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
                <h3 id="currentMonthDisplay" style="margin:0; color:var(--morandi-green);">2026 年 3 月</h3>
                <button class="nav-btn" onclick="changeMonth(1)">❯</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div id="datePopover"></div>
            <p style="font-size: 12px; color: #999; text-align: center; margin-top: 20px;">※ 點擊有 🍡 的日期可選擇工作修改</p>
        </div>

        <div id="page2" class="page">
            <h2 id="formTitle">新增紀錄</h2>
            <div class="input-group">
                <label>工作名稱</label>
                <input type="text" id="workName" placeholder="輸入工作名稱">
            </div>
            <div class="input-group">
                <label>上班日期</label>
                <input type="date" id="workDate">
            </div>
            <div class="input-group">
                <label>當日薪資估計</label>
                <input type="number" id="dailyPay" placeholder="例如：1500">
            </div>
            <div class="input-group">
                <label>領薪設定</label>
                <select id="payDaySelect"></select>
            </div>
            <div class="btn-group">
                <button class="main-btn" id="saveBtn" onclick="saveWork()">儲存上班紀錄</button>
                <button class="delete-btn" id="deleteBtn" style="display:none;" onclick="confirmDelete()">刪除此紀錄</button>
                <button id="cancelEditBtn" style="display:none; background:none; border:none; color:#999; cursor:pointer; margin-top:10px;" onclick="resetForm(); showPage('page1');">取消修改</button>
            </div>
        </div>

        <div id="page3" class="page">
            <h2>薪資統計</h2>
            <div class="filter-box">
                <label>開始日期</label>
                <input type="date" id="filterStart">
                <label>結束日期</label>
                <input type="date" id="filterEnd">
                <button class="main-btn" style="padding: 10px;" onclick="renderStats()">套用篩選</button>
            </div>
            <div id="statsList"></div>
            <div class="total-summary" id="totalSummary"></div>
        </div>

        <div id="page4" class="page">
            <h2>管理領薪日</h2>
            <div class="input-group">
                <label>新增發薪選項</label>
                <div class="flex-row">
                    <select id="newPayMonthType" style="flex:1;">
                        <option value="當月">當月</option>
                        <option value="下個月" selected>下個月</option>
                    </select>
                    <input type="number" id="newPayDay" placeholder="幾號？" style="flex:1;">
                </div>
            </div>
            <button class="main-btn" onclick="addPayDayOption()" style="background:var(--morandi-light); margin-bottom:20px;">新增選項</button>
            <div id="optionsList"></div>
        </div>
    </div>

    <script>
        let viewDate = new Date(2026, 2, 1);
        let workRecords = JSON.parse(localStorage.getItem('workRecords_v8')) || [];
        // 初始化包含「當日現領」
        let payDayOptions = JSON.parse(localStorage.getItem('payDayOptions_v8')) || [
            { id: 'opt_cash', monthType: '當月', day: 0, label: '當日現領' },
            { id: 'opt_1', monthType: '下個月', day: 5, label: '下個月 5 號入帳' },
            { id: 'opt_2', monthType: '下個月', day: 10, label: '下個月 10 號入帳' }
        ];
        let editingId = null;

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelector(`button[onclick="showPage('${pageId}')"]`).classList.add('active');
            
            closePopover();
            if(pageId === 'page1') renderCalendar();
            if(pageId === 'page3') renderStats();
            if(pageId === 'page4') renderOptions();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const display = document.getElementById('currentMonthDisplay');
            grid.innerHTML = '';
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            display.innerText = `${year} 年 ${month + 1} 月`;

            ['日','一','二','三','四','五','六'].forEach(w => grid.innerHTML += `<div class="weekday">${w}</div>`);
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const hasWork = workRecords.some(r => r.date === dateKey);
                grid.innerHTML += `<div class="day ${hasWork ? 'has-work' : ''}" onclick="handleDateClick(event, '${dateKey}')">${d}</div>`;
            }
        }

        function handleDateClick(event, dateStr) {
            const records = workRecords.filter(r => r.date === dateStr);
            if (records.length > 1) {
                showPopover(event, records);
            } else if (records.length === 1) {
                startEdit(records[0].id);
            } else {
                resetForm();
                document.getElementById('workDate').value = dateStr;
                showPage('page2');
            }
        }

        function showPopover(event, records) {
            const popover = document.getElementById('datePopover');
            popover.innerHTML = '<p style="margin:5px 0; font-size:12px; text-align:center;">選擇工作：</p>';
            records.forEach(r => {
                const btn = document.createElement('button');
                btn.innerText = r.name;
                btn.onclick = () => { startEdit(r.id); closePopover(); };
                popover.appendChild(btn);
            });
            const rect = event.target.getBoundingClientRect();
            const containerRect = document.getElementById('mainContainer').getBoundingClientRect();
            popover.style.left = `${rect.left - containerRect.left}px`;
            popover.style.top = `${rect.bottom - containerRect.top + 5}px`;
            popover.style.display = 'block';
            event.stopPropagation();
        }

        function closePopover() { document.getElementById('datePopover').style.display = 'none'; }
        document.addEventListener('click', closePopover);

        function startEdit(id) {
            const r = workRecords.find(item => item.id === id);
            if (!r) return;
            editingId = id;
            document.getElementById('formTitle').innerText = "修改紀錄";
            document.getElementById('workName').value = r.name;
            document.getElementById('workDate').value = r.date;
            document.getElementById('dailyPay').value = r.pay;
            document.getElementById('payDaySelect').value = r.payOptionId;
            document.getElementById('saveBtn').innerText = "確認修改";
            document.getElementById('deleteBtn').style.display = "block";
            document.getElementById('cancelEditBtn').style.display = "block";
            showPage('page2');
        }

        function resetForm() {
            editingId = null;
            document.getElementById('formTitle').innerText = "新增紀錄";
            document.getElementById('workName').value = "";
            document.getElementById('workDate').valueAsDate = new Date();
            document.getElementById('dailyPay').value = "";
            document.getElementById('saveBtn').innerText = "儲存上班紀錄";
            document.getElementById('deleteBtn').style.display = "none";
            document.getElementById('cancelEditBtn').style.display = "none";
        }

        function saveWork() {
            const name = document.getElementById('workName').value || "未命名";
            const date = document.getElementById('workDate').value;
            const pay = parseInt(document.getElementById('dailyPay').value);
            const optId = document.getElementById('payDaySelect').value;
            
            if (!date || isNaN(pay)) return alert("請填寫日期與金額");

            const opt = payDayOptions.find(o => o.id === optId);
            const [y, m, d] = date.split('-').map(Number);
            let pDate = new Date(y, m-1, d);
            
            if(optId === 'opt_cash') {
                // 當日現領，領薪日等於上班日
            } else {
                if(opt.monthType === '下個月') pDate.setMonth(pDate.getMonth() + 1);
                pDate.setDate(opt.day);
            }
            const actualPayDate = pDate.toISOString().split('T')[0];

            if (editingId) workRecords = workRecords.filter(r => r.id !== editingId);
            workRecords.push({ id: editingId || 'id_' + Date.now(), name, date, pay, payOptionId: optId, actualPayDate });
            localStorage.setItem('workRecords_v8', JSON.stringify(workRecords));
            resetForm();
            showPage('page1');
        }

        function confirmDelete() {
            if(confirm("確定要刪除這筆紀錄嗎？")) {
                workRecords = workRecords.filter(r => r.id !== editingId);
                localStorage.setItem('workRecords_v8', JSON.stringify(workRecords));
                resetForm();
                showPage('page1');
            }
        }

        function renderStats() {
            const list = document.getElementById('statsList');
            const summary = document.getElementById('totalSummary');
            const start = document.getElementById('filterStart').value;
            const end = document.getElementById('filterEnd').value;
            list.innerHTML = '';
            
            let filtered = workRecords;
            if (start && end) {
                filtered = workRecords.filter(r => r.actualPayDate >= start && r.actualPayDate <= end);
            }

            const grouped = filtered.reduce((acc, r) => {
                acc[r.actualPayDate] = acc[r.actualPayDate] || { total: 0, items: [] };
                acc[r.actualPayDate].total += r.pay;
                acc[r.actualPayDate].items.push(r);
                return acc;
            }, {});

            let grandTotal = 0;
            Object.keys(grouped).sort().forEach(date => {
                grandTotal += grouped[date].total;
                const card = document.createElement('div');
                card.className = 'stat-card';
                card.innerHTML = `<div style="font-weight:bold;">${date} 領取</div><div style="font-size:24px;">$${grouped[date].total}</div>`;
                grouped[date].items.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'stat-item';
                    itemDiv.innerText = `└ ${item.name}: $${item.pay}`;
                    itemDiv.onclick = () => startEdit(item.id);
                    card.appendChild(itemDiv);
                });
                list.appendChild(card);
            });
            summary.innerHTML = `<p style="color:var(--morandi-light);">區間總計金額</p><h2 style="font-size:30px;">$${grandTotal}</h2>`;
        }

        function renderOptions() {
            const select = document.getElementById('payDaySelect');
            const list = document.getElementById('optionsList');
            select.innerHTML = ''; list.innerHTML = '';
            payDayOptions.forEach(o => {
                select.innerHTML += `<option value="${o.id}">${o.label}</option>`;
                list.innerHTML += `<div class="list-item"><span>${o.label}</span>${o.id!=='opt_cash' ? `<span style="color:#D4A5A5; cursor:pointer;" onclick="deleteOption('${o.id}')">✕</span>` : ''}</div>`;
            });
        }

        function addPayDayOption() {
            const type = document.getElementById('newPayMonthType').value;
            const day = document.getElementById('newPayDay').value;
            if (!day) return alert("請輸入日期");
            payDayOptions.push({ id: 'opt_' + Date.now(), monthType: type, day: parseInt(day), label: `${type} ${day} 號入帳` });
            localStorage.setItem('payDayOptions_v8', JSON.stringify(payDayOptions));
            renderOptions();
        }

        function deleteOption(id) {
            payDayOptions = payDayOptions.filter(o => o.id !== id);
            localStorage.setItem('payDayOptions_v8', JSON.stringify(payDayOptions));
            renderOptions();
        }

        function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); renderCalendar(); }

        renderCalendar();
        renderOptions();
        resetForm();
    </script>
</body>
</html>
