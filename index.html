<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tell My Doggy - Salary V17</title>
    <style>
        :root {
            --morandi-green: #A3B18A;
            --morandi-blue: #8E9AAF;
            --morandi-light: #B8C1B0;
            --morandi-bg: #F4F5F2;
            --text-color: #5E6B5E;
            --morandi-red: #D4A5A5;
        }

        body {
            font-family: "PingFang TC", sans-serif;
            background-color: var(--morandi-bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 380px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 20px;
            min-height: 600px;
        }

        .tabs { display: flex; background: var(--morandi-light); }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; background: none; color: white; cursor: pointer; font-size: 13px; }
        .tab-btn.active { background: var(--morandi-green); font-weight: bold; }

        .page { padding: 20px; display: none; box-sizing: border-box; }
        .page.active { display: block; }

        h2 { text-align: center; color: var(--morandi-green); margin-bottom: 20px; font-size: 1.2rem; }

        /* 月曆樣式 */
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nav-btn { background: none; border: 1px solid var(--morandi-light); color: var(--morandi-green); border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day { padding: 10px 0; font-size: 14px; border-radius: 8px; position: relative; cursor: pointer; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .day.has-work::after { content: '🍡'; font-size: 10px; position: absolute; bottom: 2px; right: 2px; }
        .weekday { font-weight: bold; color: var(--morandi-light); padding-bottom: 10px; }

        /* 表單統一對齊 */
        .input-group { margin-bottom: 15px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: var(--morandi-green); }
        
        input, select {
            width: 260px !important;
            padding: 12px; 
            border: 2px solid var(--morandi-light); 
            border-radius: 15px;
            color: var(--text-color); 
            font-size: 16px; 
            background: white; 
            box-sizing: border-box;
            text-align: center; 
            text-align-last: center; /* 讓下拉選單文字絕對置中 */
        }

        .main-btn { width: 260px; padding: 14px; background: var(--morandi-green); color: white; border: none; border-radius: 15px; font-size: 16px; cursor: pointer; font-weight: bold; margin: 10px auto; display: block; }
        .secondary-btn { width: 260px; padding: 10px; background: white; color: var(--morandi-light); border: 1px solid var(--morandi-light); border-radius: 15px; font-size: 14px; margin: 5px auto; display: block; }

        /* 統計篩選 (仿照圖一) */
        .filter-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #fff;
            padding: 10px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .filter-row input {
            width: 110px !important;
            padding: 8px;
            font-size: 12px;
            border-radius: 10px;
            border: 1px solid var(--morandi-light);
        }
        .btn-sm {
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            border: none;
            cursor: pointer;
        }
        .btn-apply { background: var(--morandi-green); color: white; }
        .btn-clear { background: var(--morandi-light); color: white; }

        /* 設定頁面 (仿照圖二) */
        .setting-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .option-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f9f9f9;
        }
        .option-item:last-child { border-bottom: none; }
        .del-icon { color: var(--morandi-red); cursor: pointer; font-weight: bold; font-size: 18px; }

        /* 統計卡片 */
        .stat-card { padding: 15px; border-radius: 15px; margin-bottom: 12px; color: white; }
        .type-cash { background-color: var(--morandi-green); } 
        .type-fixed { background-color: var(--morandi-blue); } 
        .stat-item { font-size: 13px; margin-top: 8px; padding: 10px; background: rgba(255,255,255,0.25); border-radius: 10px; }

        #datePopover {
            display: none; position: absolute; background: white; border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 10px; z-index: 100;
            border: 2px solid var(--morandi-light); width: 150px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="showPage('page1')">打卡紀錄</button>
            <button class="tab-btn" onclick="showPage('page2')">紀錄</button>
            <button class="tab-btn" onclick="showPage('page3')">統計</button>
            <button class="tab-btn" onclick="showPage('page4')">設定</button>
        </div>

        <div id="page1" class="page active">
            <h2 id="currentMonthDisplay">2026 年 3 月</h2>
            <div class="calendar-nav">
                <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
                <button class="nav-btn" onclick="changeMonth(1)">❯</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div id="datePopover"></div>
        </div>

        <div id="page2" class="page">
            <h2 id="formTitle">新增紀錄</h2>
            <div class="input-group">
                <label>工作名稱</label>
                <input type="text" id="workName" placeholder="沙發馬鈴薯">
            </div>
            <div class="input-group">
                <label>上班日期</label>
                <input type="date" id="workDate">
            </div>
            <div class="input-group">
                <label>當日薪資估計</label>
                <input type="number" id="dailyPay" placeholder="輸入金額">
            </div>
            <div class="input-group">
                <label>領薪設定</label>
                <select id="payDaySelect"></select>
            </div>
            <button class="main-btn" onclick="saveWork()">儲存紀錄</button>
            <button class="secondary-btn" id="deleteBtn" style="display:none; color:var(--morandi-red); border-color:var(--morandi-red);" onclick="confirmDelete()">刪除紀錄</button>
            <button id="cancelEditBtn" style="display:none; width:100%; border:none; background:none; color:#999; margin-top:5px;" onclick="resetForm(); showPage('page1');">取消修改</button>
        </div>

        <div id="page3" class="page">
            <h2>薪資統計</h2>
            <div class="filter-row">
                <input type="date" id="filterStart">
                <span style="color:var(--morandi-light)">~</span>
                <input type="date" id="filterEnd">
                <button class="btn-sm btn-apply" onclick="renderStats()">套用</button>
                <button class="btn-sm btn-clear" onclick="clearFilter()">✕</button>
            </div>
            <div id="statsList"></div>
            <div style="text-align:center; margin-top:20px; border-top:1px dashed #ccc; padding-top:15px;" id="totalSummary"></div>
        </div>

        <div id="page4" class="page">
            <h2>發薪設定</h2>
            <div class="setting-card">
                <div class="input-group">
                    <label>新增發薪日</label>
                    <select id="newPayMonthType" style="margin-bottom:10px; width:100% !important;">
                        <option value="當月">當月</option>
                        <option value="下個月" selected>下個月</option>
                    </select>
                    <input type="number" id="newPayDay" placeholder="請輸入日期 (號碼)" style="width:100% !important;">
                </div>
                <button class="main-btn" style="width:100% !important;" onclick="addPayDayOption()">確認新增</button>
            </div>
            
            <div id="optionsList"></div>
        </div>
    </div>

    <script>
        let viewDate = new Date(2026, 2, 1);
        let workRecords = JSON.parse(localStorage.getItem('workRecords_v17')) || [];
        let payDayOptions = JSON.parse(localStorage.getItem('payDayOptions_v17')) || [
            { id: 'opt_cash', monthType: '當月', day: 0, label: '當日現領' },
            { id: 'opt_19', monthType: '當月', day: 19, label: '當月 19 號入帳' }
        ];
        let editingId = null;

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelector(`button[onclick="showPage('${pageId}')"]`).classList.add('active');
            if(pageId === 'page1') renderCalendar();
            if(pageId === 'page3') renderStats();
            if(pageId === 'page4') renderOptions();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            document.getElementById('currentMonthDisplay').innerText = `${viewDate.getFullYear()} 年 ${viewDate.getMonth() + 1} 月`;
            ['日','一','二','三','四','五','六'].forEach(w => grid.innerHTML += `<div class="weekday">${w}</div>`);
            const firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
            const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const hasWork = workRecords.some(r => r.date === dateKey);
                grid.innerHTML += `<div class="day ${hasWork ? 'has-work' : ''}" onclick="handleDateClick(event, '${dateKey}')">${d}</div>`;
            }
        }

        function handleDateClick(event, dateStr) {
            const records = workRecords.filter(r => r.date === dateStr);
            if (records.length > 1) {
                const popover = document.getElementById('datePopover');
                popover.innerHTML = '';
                records.forEach(r => {
                    const btn = document.createElement('button');
                    btn.innerText = r.name;
                    btn.style.width = '100%'; btn.style.padding = '10px'; btn.style.marginBottom = '5px';
                    btn.style.borderRadius = '8px'; btn.style.border = '1px solid #eee';
                    btn.onclick = () => { startEdit(r.id); popover.style.display='none'; };
                    popover.appendChild(btn);
                });
                popover.style.left = event.pageX + 'px'; popover.style.top = event.pageY + 'px';
                popover.style.display = 'block'; event.stopPropagation();
            } else if (records.length === 1) startEdit(records[0].id);
            else { resetForm(); document.getElementById('workDate').value = dateStr; showPage('page2'); }
        }

        function saveWork() {
            const name = document.getElementById('workName').value || "沙發馬鈴薯";
            const dateStr = document.getElementById('workDate').value;
            const pay = parseInt(document.getElementById('dailyPay').value);
            const optId = document.getElementById('payDaySelect').value;
            if (!dateStr || isNaN(pay)) return alert("請填寫薪水資訊");

            const opt = payDayOptions.find(o => o.id === optId);
            const dateParts = dateStr.split('-');
            let pDate = new Date(dateParts[0], dateParts[1]-1, dateParts[2]);
            
            if(optId !== 'opt_cash') {
                if(opt.monthType === '下個月') pDate.setMonth(pDate.getMonth() + 1);
                pDate.setDate(opt.day);
            }
            const actualPayDate = `${pDate.getFullYear()}-${String(pDate.getMonth()+1).padStart(2,'0')}-${String(pDate.getDate()).padStart(2,'0')}`;

            if (editingId) workRecords = workRecords.filter(r => r.id !== editingId);
            workRecords.push({ id: editingId || 'id_' + Date.now(), name, date: dateStr, pay, payOptionId: optId, actualPayDate });
            localStorage.setItem('workRecords_v17', JSON.stringify(workRecords));
            resetForm(); showPage('page1');
        }

        function renderStats() {
            const list = document.getElementById('statsList');
            const summary = document.getElementById('totalSummary');
            const start = document.getElementById('filterStart').value;
            const end = document.getElementById('filterEnd').value;
            list.innerHTML = '';

            let filtered = workRecords;
            if (start && end) filtered = workRecords.filter(r => r.actualPayDate >= start && r.actualPayDate <= end);

            const grouped = filtered.reduce((acc, r) => {
                const key = r.actualPayDate;
                if (!acc[key]) acc[key] = { total: 0, items: [], isCash: r.payOptionId === 'opt_cash' };
                acc[key].total += r.pay;
                acc[key].items.push(r);
                return acc;
            }, {});

            let grandTotal = 0;
            Object.keys(grouped).sort().forEach(payDate => {
                grandTotal += grouped[payDate].total;
                const card = document.createElement('div');
                card.className = `stat-card ${grouped[payDate].isCash ? 'type-cash' : 'type-fixed'}`;
                card.innerHTML = `
                    <div style="font-size:11px;">${grouped[payDate].isCash ? '✨ 當日現領' : '📅 預計領薪入帳'}</div>
                    <div style="font-size:18px;font-weight:bold;">${payDate}</div>
                    <div style="font-size:22px;font-weight:bold;margin-bottom:10px;">$${grouped[payDate].total.toLocaleString()}</div>
                `;
                grouped[payDate].items.forEach(item => {
                    card.innerHTML += `<div class="stat-item" onclick="startEdit('${item.id}')">
                        <div>${item.name} ($${item.pay.toLocaleString()})</div>
                        <div style="font-size:11px;opacity:0.8;">工作日: ${item.date}</div>
                    </div>`;
                });
                list.appendChild(card);
            });
            summary.innerHTML = `<p style="color:#999;font-size:13px;margin-bottom:5px;">期間累積總金額</p><h2 style="margin:0;color:var(--morandi-green);">$${grandTotal.toLocaleString()}</h2>`;
        }

        function renderOptions() {
            const select = document.getElementById('payDaySelect');
            const list = document.getElementById('optionsList');
            select.innerHTML = ''; list.innerHTML = '';
            payDayOptions.forEach(o => {
                select.innerHTML += `<option value="${o.id}">${o.label}</option>`;
                list.innerHTML += `
                <div class="setting-card" style="padding:10px 15px; margin-bottom:10px;">
                    <div class="option-item">
                        <span>${o.label}</span>
                        ${o.id!=='opt_cash' ? `<span class="del-icon" onclick="deleteOption('${o.id}')">✕</span>` : ''}
                    </div>
                </div>`;
            });
        }

        function addPayDayOption() {
            const day = document.getElementById('newPayDay').value;
            const type = document.getElementById('newPayMonthType').value;
            if (!day) return alert("請輸入日期");
            payDayOptions.push({ id: 'opt_' + Date.now(), monthType: type, day: parseInt(day), label: `${type} ${day} 號入帳` });
            localStorage.setItem('payDayOptions_v17', JSON.stringify(payDayOptions));
            renderOptions();
            document.getElementById('newPayDay').value = '';
        }

        function deleteOption(id) {
            if(confirm("確定刪除此領薪設定？")) {
                payDayOptions = payDayOptions.filter(o => o.id !== id);
                localStorage.setItem('payDayOptions_v17', JSON.stringify(payDayOptions));
                renderOptions();
            }
        }

        function startEdit(id) {
            const r = workRecords.find(i => i.id === id);
            editingId = id;
            document.getElementById('formTitle').innerText = "修改紀錄";
            document.getElementById('workName').value = r.name;
            document.getElementById('workDate').value = r.date;
            document.getElementById('dailyPay').value = r.pay;
            document.getElementById('payDaySelect').value = r.payOptionId;
            document.getElementById('deleteBtn').style.display = 'block';
            document.getElementById('cancelEditBtn').style.display = 'block';
            showPage('page2');
        }

        function resetForm() {
            editingId = null;
            document.getElementById('formTitle').innerText = "新增紀錄";
            document.getElementById('workName').value = '';
            document.getElementById('workDate').valueAsDate = new Date();
            document.getElementById('dailyPay').value = '';
            document.getElementById('deleteBtn').style.display = 'none';
            document.getElementById('cancelEditBtn').style.display = 'none';
        }

        function confirmDelete() {
            if(confirm("確定要刪除這筆紀錄嗎？")) { 
                workRecords = workRecords.filter(r => r.id !== editingId); 
                localStorage.setItem('workRecords_v17', JSON.stringify(workRecords)); 
                showPage('page1'); 
            }
        }

        function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); renderCalendar(); }
        function clearFilter() { document.getElementById('filterStart').value = ''; document.getElementById('filterEnd').value = ''; renderStats(); }
        document.addEventListener('click', () => { if(document.getElementById('datePopover')) document.getElementById('datePopover').style.display='none' });

        renderCalendar(); renderOptions();
    </script>
</body>
</html>
