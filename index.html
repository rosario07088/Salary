<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Calculator</title>
    <style>
        :root {
            --morandi-green: #A3B18A;
            --morandi-light: #B8C1B0;
            --morandi-bg: #F4F5F2;
            --text-color: #5E6B5E;
        }

        body {
            font-family: "PingFang TC", sans-serif;
            background-color: var(--morandi-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .tabs {
            display: flex;
            background: var(--morandi-light);
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .tab-btn.active {
            background: var(--morandi-green);
            font-weight: bold;
        }

        .page { padding: 25px; display: none; }
        .page.active { display: block; }

        /* 月曆標題與滑動控制 */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: none;
            border: 1px solid var(--morandi-light);
            color: var(--morandi-green);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .day {
            padding: 10px 0;
            font-size: 14px;
            border-radius: 8px;
            position: relative;
        }

        .day.has-work::after {
            content: '💰';
            font-size: 10px;
            position: absolute;
            bottom: 2px;
            right: 2px;
        }

        /* 莫蘭迪風格輸入框 */
        .input-group { margin-bottom: 20px; text-align: center; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--morandi-light);
            border-radius: 12px;
            color: var(--morandi-green);
            text-align: center;
            font-size: 16px;
            background: white;
            outline: none;
        }

        input:focus { border-color: var(--morandi-green); }

        .main-btn {
            width: 100%;
            padding: 15px;
            background: var(--morandi-green);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            cursor: pointer;
        }

        /* 統計卡片 */
        .stat-card {
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 10px;
            color: white;
            text-align: center;
        }

        /* 列表樣式 */
        .list-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="showPage('page1')">紀錄</button>
            <button class="tab-btn" onclick="showPage('page2')">統計</button>
            <button class="tab-btn" onclick="showPage('page3')">設定</button>
        </div>

        <div id="page1" class="page active">
            <div class="calendar-nav">
                <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
                <h2 id="currentMonthDisplay" style="margin:0; color:var(--morandi-green);">2026 年 3 月</h2>
                <button class="nav-btn" onclick="changeMonth(1)">❯</button>
            </div>
            <div class="calendar" id="calendarGrid"></div>

            <hr style="margin: 25px 0; border: 0.5px solid #eee;">

            <div class="input-group">
                <label>上班日期</label>
                <input type="date" id="workDate">
            </div>
            <div class="input-group">
                <label>當日薪水估計</label>
                <input type="number" id="dailyPay" placeholder="輸入金額">
            </div>
            <div class="input-group">
                <label>領薪設定</label>
                <select id="payDaySelect"></select>
            </div>
            <button class="main-btn" onclick="saveWork()">儲存上班紀錄</button>
        </div>

        <div id="page2" class="page">
            <h2 style="text-align:center; color:var(--morandi-green);">薪資統計</h2>
            <div id="statsList"></div>
        </div>

        <div id="page3" class="page">
            <h2 style="text-align:center; color:var(--morandi-green);">管理領薪日</h2>
            <div class="input-group">
                <label>新增發薪日 (號碼)</label>
                <input type="number" id="newPayDay" placeholder="例如：15">
            </div>
            <button class="main-btn" onclick="addPayDayOption()" style="background:var(--morandi-light);">新增選項</button>
            
            <div id="currentOptions" style="margin-top:20px;">
                <p style="font-size:12px;">目前的選項：</p>
                <div id="optionsList"></div>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date(2026, 2, 1); // 從 2026 年 3 月開始
        let workRecords = JSON.parse(localStorage.getItem('workRecords')) || [];
        let payDayOptions = JSON.parse(localStorage.getItem('payDayOptions')) || [5, 10];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
            if(pageId === 'page2') renderStats();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const display = document.getElementById('currentMonthDisplay');
            grid.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            display.innerText = `${year} 年 ${month + 1} 月`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const hasWork = workRecords.some(r => r.date === dateKey);
                grid.innerHTML += `<div class="day ${hasWork ? 'has-work' : ''}">${d}</div>`;
            }
        }

        function changeMonth(step) {
            currentDate.setMonth(currentDate.getMonth() + step);
            renderCalendar();
        }

        function updatePayDayUI() {
            const select = document.getElementById('payDaySelect');
            const list = document.getElementById('optionsList');
            select.innerHTML = '';
            list.innerHTML = '';
            payDayOptions.forEach(day => {
                select.innerHTML += `<option value="${day}">下個月 ${day} 號入帳</option>`;
                list.innerHTML += `<div class="list-item"><span>${day} 號</span></div>`;
            });
        }

        function addPayDayOption() {
            const day = document.getElementById('newPayDay').value;
            if (day && !payDayOptions.includes(parseInt(day))) {
                payDayOptions.push(parseInt(day));
                localStorage.setItem('payDayOptions', JSON.stringify(payDayOptions));
                updatePayDayUI();
                alert('已新增發薪日選項');
            }
        }

        function saveWork() {
            const date = document.getElementById('workDate').value;
            const pay = parseFloat(document.getElementById('dailyPay').value);
            const type = document.getElementById('payDaySelect').value;
            if (!date || !pay) return alert('請填寫完整資訊');

            workRecords.push({ date, pay, type });
            localStorage.setItem('workRecords', JSON.stringify(workRecords));
            renderCalendar();
            alert('儲存成功！');
        }

        function renderStats() {
            const container = document.getElementById('statsList');
            container.innerHTML = '';
            const colors = ['#A3B18A', '#95A3B3', '#8DA994', '#B8C1B0'];

            payDayOptions.forEach((day, index) => {
                const total = workRecords
                    .filter(r => r.type == day)
                    .reduce((sum, r) => sum + r.pay, 0);
                
                container.innerHTML += `
                    <div class="stat-card" style="background:${colors[index % colors.length]}">
                        <div style="font-size:14px;">下個月 ${day} 號預計領取</div>
                        <div style="font-size:24px; font-weight:bold;">$${total.toLocaleString()}</div>
                    </div>
                `;
            });
        }

        // 初始化
        updatePayDayUI();
        renderCalendar();
        document.getElementById('workDate').valueAsDate = new Date();
    </script>
</body>
</html>
