<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tell My Doggy - Salary</title>
    <style>
        :root {
            --morandi-green: #A3B18A;
            --morandi-light: #B8C1B0;
            --morandi-bg: #F4F5F2;
            --text-color: #5E6B5E;
        }

        body {
            font-family: "PingFang TC", sans-serif;
            background-color: var(--morandi-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            background: var(--morandi-light);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 5px;
            border: none;
            background: none;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }

        .tab-btn.active {
            background: var(--morandi-green);
            font-weight: bold;
        }

        .page { padding: 20px; display: none; }
        .page.active { display: block; }

        h2 { text-align: center; color: var(--morandi-green); margin-top: 0; font-size: 1.2rem; }

        /* 月曆樣式 */
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nav-btn { background: none; border: 1px solid var(--morandi-light); color: var(--morandi-green); border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day { padding: 12px 0; font-size: 14px; border-radius: 8px; position: relative; cursor: pointer; }
        .day.has-work::after { content: '🍡'; font-size: 10px; position: absolute; bottom: 1px; right: 1px; }
        .day:hover { background-color: var(--morandi-bg); }

        /* 表單樣式 */
        .input-group { margin-bottom: 15px; text-align: center; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select {
            width: 100%; padding: 12px; border: 2px solid var(--morandi-light); border-radius: 12px;
            color: var(--morandi-green); text-align: center; text-align-last: center;
            font-size: 16px; background: white; outline: none; box-sizing: border-box; appearance: none;
        }
        select {
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23A3B18A" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>');
            background-repeat: no-repeat; background-position: calc(100% - 10px) center; padding-right: 40px;
        }

        .main-btn { width: 100%; padding: 15px; background: var(--morandi-green); color: white; border: none; border-radius: 15px; font-size: 16px; cursor: pointer; }
        
        /* 統計與列表 */
        .stat-card { padding: 15px; border-radius: 12px; margin-bottom: 10px; color: white; text-align: center; }
        .filter-box { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee; }
        .total-sum { text-align: center; padding: 15px; border-top: 2px dashed var(--morandi-light); margin-top: 10px; font-weight: bold; font-size: 18px; color: var(--morandi-green); }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="showPage('page1')">打卡紀錄</button>
            <button class="tab-btn" onclick="showPage('page2')">紀錄</button>
            <button class="tab-btn" onclick="showPage('page3')">統計</button>
            <button class="tab-btn" onclick="showPage('page4')">設定</button>
        </div>

        <div id="page1" class="page active">
            <h2>打卡紀錄</h2>
            <div class="calendar-nav">
                <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
                <h3 id="currentMonthDisplay" style="margin:0; color:var(--morandi-green);">2026 年 3 月</h3>
                <button class="nav-btn" onclick="changeMonth(1)">❯</button>
            </div>
            <div class="calendar" id="calendarGrid"></div>
            <p style="font-size: 12px; color: #999; text-align: center; margin-top: 15px;">※ 點擊有 🍡 的日期可修改資料</p>
        </div>

        <div id="page2" class="page">
            <h2 id="formTitle">新增紀錄</h2>
            <div class="input-group">
                <label>工作名稱</label>
                <input type="text" id="workName" placeholder="例如：品牌促銷、外場支援">
            </div>
            <div class="input-group">
                <label>上班日期</label>
                <input type="date" id="workDate">
            </div>
            <div class="input-group">
                <label>當日薪資估計</label>
                <input type="number" id="dailyPay" placeholder="輸入金額">
            </div>
            <div class="input-group">
                <label>領薪設定</label>
                <select id="payDaySelect"></select>
            </div>
            <button class="main-btn" id="saveBtn" onclick="saveWork()">儲存上班紀錄</button>
            <button id="cancelEditBtn" style="display:none; width:100%; background:none; border:none; color:#999; margin-top:10px;" onclick="resetForm()">取消修改</button>
        </div>

        <div id="page3" class="page">
            <h2>薪資統計</h2>
            <div class="filter-box">
                <label style="margin-bottom:10px;">查詢區間</label>
                <input type="date" id="filterStart" style="margin-bottom:5px;">
                <input type="date" id="filterEnd">
                <button class="main-btn" style="margin-top:10px; padding:8px; font-size:14px; background:var(--morandi-light);" onclick="renderStats()">套用篩選</button>
            </div>
            <div id="statsList"></div>
            <div id="totalDisplay" class="total-sum"></div>
        </div>

        <div id="page4" class="page">
            <h2>管理領薪日</h2>
            <div class="input-group">
                <label>新增發薪日</label>
                <div style="display:flex; gap:10px;">
                    <select id="newPayMonthType">
                        <option value="當月">當月</option>
                        <option value="下個月" selected>下個月</option>
                        <option value="當日">當日</option>
                    </select>
                    <input type="number" id="newPayDay" placeholder="幾號？" style="flex:1.5;">
                </div>
            </div>
            <button class="main-btn" onclick="addPayDayOption()" style="background:var(--morandi-light);">新增發薪選項</button>
            <div id="optionsList" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        let currentDate = new Date(2026, 2, 1);
        let workRecords = JSON.parse(localStorage.getItem('workRecords_v5')) || [];
        let payDayOptions = JSON.parse(localStorage.getItem('payDayOptions_v5')) || [
            { id: '當日_0', monthType: '當日', day: 0, label: '當日現領' },
            { id: '下個月_5', monthType: '下個月', day: 5, label: '下個月 5 號入帳' },
            { id: '下個月_20', monthType: '下個月', day: 20, label: '下個月 20 號入帳' }
        ];
        let editingDate = null; // 用於判斷是否正在修改

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            const targetBtn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.getAttribute('onclick').includes(pageId));
            if(targetBtn) targetBtn.classList.add('active');
            
            if(pageId === 'page1') renderCalendar();
            if(pageId === 'page3') renderStats();
        }

        // --- 第一頁：月曆邏輯 ---
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const display = document.getElementById('currentMonthDisplay');
            grid.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            display.innerText = `${year} 年 ${month + 1} 月`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const hasWork = workRecords.some(r => r.date === dateKey);
                grid.innerHTML += `<div class="day ${hasWork ? 'has-work' : ''}" onclick="clickDate('${dateKey}')">${d}</div>`;
            }
        }

        function clickDate(dateStr) {
            const record = workRecords.find(r => r.date === dateStr);
            if (record) {
                // 如果有點過，帶入資料到第二頁進行修改
                editingDate = dateStr;
                document.getElementById('formTitle').innerText = "修改紀錄";
                document.getElementById('workName').value = record.name || "";
                document.getElementById('workDate').value = record.date;
                document.getElementById('dailyPay').value = record.pay;
                document.getElementById('payDaySelect').value = record.payOptionId;
                document.getElementById('saveBtn').innerText = "確認修改";
                document.getElementById('cancelEditBtn').style.display = "block";
                showPage('page2');
            } else {
                // 如果沒點過，切換到第二頁並帶入日期
                resetForm();
                document.getElementById('workDate').value = dateStr;
                showPage('page2');
            }
        }

        function changeMonth(step) {
            currentDate.setMonth(currentDate.getMonth() + step);
            renderCalendar();
        }

        // --- 第二頁：儲存/修改邏輯 ---
        function resetForm() {
            editingDate = null;
            document.getElementById('formTitle').innerText = "新增紀錄";
            document.getElementById('workName').value = "";
            document.getElementById('workDate').valueAsDate = new Date();
            document.getElementById('dailyPay').value = "";
            document.getElementById('saveBtn').innerText = "儲存上班紀錄";
            document.getElementById('cancelEditBtn').style.display = "none";
        }

        function saveWork() {
            const name = document.getElementById('workName').value || "未命名工作";
            const dateInput = document.getElementById('workDate').value;
            const pay = parseFloat(document.getElementById('dailyPay').value);
            const payOptionId = document.getElementById('payDaySelect').value;
            if (!dateInput || isNaN(pay)) return alert('請填寫完整資訊');

            const payOption = payDayOptions.find(opt => opt.id === payOptionId);
            const [y, m, d] = dateInput.split('-').map(Number);
            let pYear = y, pMonth = m - 1, pDay = d;

            if (payOption.monthType === '當月') pDay = payOption.day;
            else if (payOption.monthType === '下個月') { pMonth += 1; pDay = payOption.day; }
            
            const finalPayDate = new Date(pYear, pMonth, pDay);
            const actualPayDateStr = `${finalPayDate.getFullYear()}-${String(finalPayDate.getMonth()+1).padStart(2,'0')}-${String(finalPayDate.getDate()).padStart(2,'0')}`;

            // 如果是修改，先刪除舊的
            if (editingDate) {
                workRecords = workRecords.filter(r => r.date !== editingDate);
            }

            workRecords.push({ name, date: dateInput, pay, payOptionId, actualPayDate: actualPayDateStr });
            localStorage.setItem('workRecords_v5', JSON.stringify(workRecords));
            alert(editingDate ? '修改成功！' : '儲存成功！');
            resetForm();
            showPage('page1');
        }

        // --- 第三頁：統計篩選邏輯 ---
        function renderStats() {
            const start = document.getElementById('filterStart').value;
            const end = document.getElementById('filterEnd').value;
            const container = document.getElementById('statsList');
            const totalBox = document.getElementById('totalDisplay');
            container.innerHTML = '';
            
            let filtered = workRecords;
            if (start && end) {
                filtered = workRecords.filter(r => r.actualPayDate >= start && r.actualPayDate <= end);
            }

            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#ccc;">區間內無紀錄</p>';
                totalBox.innerText = '區間加總：$0';
                return;
            }

            // 按領薪日分組顯示
            const grouped = filtered.reduce((acc, r) => {
                if (!acc[r.actualPayDate]) acc[r.actualPayDate] = { total: 0, items: [] };
                acc[r.actualPayDate].total += r.pay;
                acc[r.actualPayDate].items.push(r);
                return acc;
            }, {});

            const sortedDates = Object.keys(grouped).sort();
            let grandTotal = 0;
            const colors = ['#A3B18A', '#95A3B3', '#8DA994', '#B8C1B0'];

            sortedDates.forEach((dateStr, index) => {
                const [y, m, d] = dateStr.split('-');
                const total = grouped[dateStr].total;
                grandTotal += total;
                
                let itemsHtml = grouped[dateStr].items.map(item => 
                    `<div style="font-size:12px; opacity:0.9;">└ ${item.name}: $${item.pay}</div>`
                ).join('');

                container.innerHTML += `
                    <div class="stat-card" style="background:${colors[index % colors.length]}">
                        <div style="font-size:14px; font-weight:bold;">${y}年${parseInt(m)}月${parseInt(d)}日 領取</div>
                        <div style="font-size:24px; font-weight:bold;">$${total.toLocaleString()}</div>
                        ${itemsHtml}
                    </div>
                `;
            });

            totalBox.innerHTML = `<span style="font-size:14px; color:#999;">區間總計金額</span><br>$${grandTotal.toLocaleString()}`;
        }

        // --- 第四頁：發薪日管理 (維持不變) ---
        function updatePayDayUI() {
            const select = document.getElementById('payDaySelect');
            const list = document.getElementById('optionsList');
            select.innerHTML = ''; list.innerHTML = '';
            payDayOptions.forEach(opt => {
                select.innerHTML += `<option value="${opt.id}">${opt.label}</option>`;
                list.innerHTML += `<div class="list-item"><span>${opt.label}</span><span style="color:#ccc; cursor:pointer;" onclick="deleteOption('${opt.id}')">✕</span></div>`;
            });
        }

        function addPayDayOption() {
            const monthType = document.getElementById('newPayMonthType').value;
            let day = parseInt(document.getElementById('newPayDay').value);
            let label = (monthType === '當日') ? "當日現領" : `${monthType} ${day} 號入帳`;
            let id = `${monthType}_${day || 0}`;
            if (monthType !== '當日' && (!day || day < 1 || day > 31)) return alert('日期錯誤');
            payDayOptions.push({ id, monthType, day: day || 0, label });
            localStorage.setItem('payDayOptions_v5', JSON.stringify(payDayOptions));
            updatePayDayUI();
        }

        function deleteOption(id) {
            payDayOptions = payDayOptions.filter(opt => opt.id !== id);
            localStorage.setItem('payDayOptions_v5', JSON.stringify(payDayOptions));
            updatePayDayUI();
        }

        // 初始化
        updatePayDayUI();
        renderCalendar();
        resetForm();
    </script>
</body>
</html>
