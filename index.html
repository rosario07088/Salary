<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tell My Doggy - Salary</title>
    <style>
        :root {
            --morandi-green: #A3B18A;
            --morandi-light: #B8C1B0;
            --morandi-bg: #F4F5F2;
            --text-color: #5E6B5E;
        }

        body {
            font-family: "PingFang TC", sans-serif;
            background-color: var(--morandi-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            background: var(--morandi-light);
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .tab-btn.active {
            background: var(--morandi-green);
            font-weight: bold;
        }

        .page { padding: 25px; display: none; }
        .page.active { display: block; }

        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: none;
            border: 1px solid var(--morandi-light);
            color: var(--morandi-green);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .day {
            padding: 10px 0;
            font-size: 14px;
            border-radius: 8px;
            position: relative;
        }

        /* 標記從 💰 改成 🍡 */
        .day.has-work::after {
            content: '🍡';
            font-size: 10px;
            position: absolute;
            bottom: 2px;
            right: 2px;
        }

        .input-group { margin-bottom: 20px; text-align: center; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--morandi-light);
            border-radius: 12px;
            color: var(--morandi-green);
            text-align: center;
            font-size: 16px;
            background: white;
            outline: none;
            box-sizing: border-box;
            appearance: none;
        }

        select {
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23A3B18A" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>');
            background-repeat: no-repeat;
            background-position: calc(100% - 10px) center;
            padding-right: 40px;
        }

        input:focus, select:focus { border-color: var(--morandi-green); }

        .main-btn {
            width: 100%;
            padding: 15px;
            background: var(--morandi-green);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            cursor: pointer;
            box-sizing: border-box;
        }

        .stat-card {
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 10px;
            color: white;
            text-align: center;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
        }
        
        .row { display: flex; gap: 10px; margin-bottom: 20px; }
        .col { flex: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="showPage('page1')">紀錄</button>
            <button class="tab-btn" onclick="showPage('page2')">統計</button>
            <button class="tab-btn" onclick="showPage('page3')">設定</button>
        </div>

        <div id="page1" class="page active">
            <div class="calendar-nav">
                <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
                <h2 id="currentMonthDisplay" style="margin:0; color:var(--morandi-green); font-size: 1.2rem;">2026 年 3 月</h2>
                <button class="nav-btn" onclick="changeMonth(1)">❯</button>
            </div>
            <div class="calendar" id="calendarGrid"></div>

            <hr style="margin: 25px 0; border: 0.5px solid #eee;">

            <div class="input-group">
                <label>上班日期</label>
                <input type="date" id="workDate">
            </div>
            <div class="input-group">
                <label>當日薪資估計</label>
                <input type="number" id="dailyPay" placeholder="輸入金額">
            </div>
            <div class="input-group">
                <label>領薪設定</label>
                <select id="payDaySelect"></select>
            </div>
            <button class="main-btn" onclick="saveWork()">儲存上班紀錄</button>
        </div>

        <div id="page2" class="page">
            <h2 style="text-align:center; color:var(--morandi-green); margin-top: 0;">薪資統計</h2>
            <div id="statsList"></div>
        </div>

        <div id="page3" class="page">
            <h2 style="text-align:center; color:var(--morandi-green); margin-top: 0;">管理領薪日</h2>
            <div class="input-group">
                <label>新增發薪日</label>
                <div class="row">
                    <div class="col">
                        <select id="newPayMonthType">
                            <option value="當月">當月</option>
                            <option value="下個月" selected>下個月</option>
                            <option value="當日">當日</option>
                        </select>
                    </div>
                    <div class="col" style="flex: 1.5;">
                        <input type="number" id="newPayDay" placeholder="幾號？ (現領不需填)">
                    </div>
                </div>
            </div>
            <button class="main-btn" onclick="addPayDayOption()" style="background:var(--morandi-light);">新增選項</button>
            
            <div id="currentOptions" style="margin-top:25px;">
                <p style="font-size:12px; color: #999; margin-bottom: 5px;">目前的選項：</p>
                <div id="optionsList"></div>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date(2026, 2, 1);
        let workRecords = JSON.parse(localStorage.getItem('workRecords_v3')) || [];
        // 初始化預設選項，包含「當日現領」
        let payDayOptions = JSON.parse(localStorage.getItem('payDayOptions_v3')) || [
            { id: '當日_0', monthType: '當日', day: 0, label: '當日現領' },
            { id: '下個月_5', monthType: '下個月', day: 5, label: '下個月 5 號入帳' },
            { id: '下個月_10', monthType: '下個月', day: 10, label: '下個月 10 號入帳' }
        ];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
            if(pageId === 'page2') renderStats();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const display = document.getElementById('currentMonthDisplay');
            grid.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            display.innerText = `${year} 年 ${month + 1} 月`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const hasWork = workRecords.some(r => r.date === dateKey);
                grid.innerHTML += `<div class="day ${hasWork ? 'has-work' : ''}">${d}</div>`;
            }
        }

        function changeMonth(step) {
            currentDate.setMonth(currentDate.getMonth() + step);
            renderCalendar();
        }

        function updatePayDayUI() {
            const select = document.getElementById('payDaySelect');
            const list = document.getElementById('optionsList');
            select.innerHTML = '';
            list.innerHTML = '';
            payDayOptions.forEach(opt => {
                select.innerHTML += `<option value="${opt.id}">${opt.label}</option>`;
                list.innerHTML += `
                    <div class="list-item">
                        <span>${opt.label}</span>
                        <span style="color: #ccc; cursor:pointer;" onclick="deleteOption('${opt.id}')">✕</span>
                    </div>`;
            });
        }

        function addPayDayOption() {
            const monthType = document.getElementById('newPayMonthType').value;
            let day = parseInt(document.getElementById('newPayDay').value);
            let label = "";
            let id = "";

            if (monthType === '當日') {
                day = 0;
                label = "當日現領";
                id = "當日_0";
            } else {
                if (!day || day < 1 || day > 31) return alert('請輸入正確的日期 (1-31)');
                label = `${monthType} ${day} 號入帳`;
                id = `${monthType}_${day}`;
            }

            if (payDayOptions.some(opt => opt.id === id)) return alert('此選項已存在');

            payDayOptions.push({ id, monthType, day, label });
            localStorage.setItem('payDayOptions_v3', JSON.stringify(payDayOptions));
            updatePayDayUI();
            document.getElementById('newPayDay').value = '';
            alert('已新增');
        }

        function deleteOption(id) {
            payDayOptions = payDayOptions.filter(opt => opt.id !== id);
            localStorage.setItem('payDayOptions_v3', JSON.stringify(payDayOptions));
            updatePayDayUI();
        }

        function saveWork() {
            const dateInput = document.getElementById('workDate').value;
            const pay = parseFloat(document.getElementById('dailyPay').value);
            const payOptionId = document.getElementById('payDaySelect').value;
            if (!dateInput || !pay) return alert('請填寫完整資訊');

            const workDate = new Date(dateInput);
            const payOption = payDayOptions.find(opt => opt.id === payOptionId);
            
            let payDate;
            if (payOption.monthType === '當日') {
                payDate = new Date(workDate);
            } else {
                payDate = new Date(workDate.getFullYear(), workDate.getMonth(), payOption.day);
                if (payOption.monthType === '下個月') {
                    payDate.setMonth(payDate.getMonth() + 1);
                }
            }

            workRecords.push({ 
                date: dateInput, 
                pay, 
                payOptionId: payOptionId,
                actualPayDate: payDate.toISOString().split('T')[0]
            });
            localStorage.setItem('workRecords_v3', JSON.stringify(workRecords));
            renderCalendar();
            document.getElementById('dailyPay').value = '';
            alert('儲存成功！');
        }

        function renderStats() {
            const container = document.getElementById('statsList');
            container.innerHTML = '';
            if (workRecords.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#ccc; margin-top:30px;">尚無紀錄</p>';
                return;
            }

            const grouped = workRecords.reduce((acc, r) => {
                if (!acc[r.actualPayDate]) acc[r.actualPayDate] = 0;
                acc[r.actualPayDate] += r.pay;
                return acc;
            }, {});

            const sortedDates = Object.keys(grouped).sort();
            const colors = ['#A3B18A', '#95A3B3', '#8DA994', '#B8C1B0'];

            sortedDates.forEach((dateStr, index) => {
                const date = new Date(dateStr);
                const displayDate = `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`;
                const total = grouped[dateStr];
                
                container.innerHTML += `
                    <div class="stat-card" style="background:${colors[index % colors.length]}">
                        <div style="font-size:14px; opacity:0.8; margin-bottom:5px;">${displayDate} 領取</div>
                        <div style="font-size:26px; font-weight:bold;">$${total.toLocaleString()}</div>
                    </div>
                `;
            });
        }

        updatePayDayUI();
        renderCalendar();
        document.getElementById('workDate').valueAsDate = new Date();
    </script>
</body>
</html>
